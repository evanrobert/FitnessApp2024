<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Log a Custom Meal</title>
    <link rel="stylesheet" href="/css/app.css">
    <script src="/js/app.js" defer></script>
</head>
<body>
<main class="app-shell">
    <nav class="topbar" aria-label="Main navigation">
        <a class="brand-mark" href="/home">
            <span class="brand-icon" aria-hidden="true">EF</span>
            Evan Fitness
        </a>
        <div class="nav-actions">
            <a class="btn btn-ghost" href="/view/Nutrition">Nutrition Log</a>
            <a class="btn btn-ghost" href="/workouts">Workouts</a>
            <a class="btn btn-ghost" href="/total">Summary</a>
        </div>
    </nav>

    <section class="page-title">
        <p class="eyebrow">Meal Builder</p>
        <h1>Log a Custom Meal</h1>
        <p>Feed the work. Add calories, macros, and optional nutrition details without leaving the training dashboard.</p>
    </section>

    <section class="tool-panel form-card">
        <form th:action="@{/Post/Custom/Meal}" th:object="${calorieInformation}" method="post" class="grid form-grid">
            <div class="field span-2">
                <label for="itemName">Meal Item Name</label>
                <input class="input" type="text" id="itemName" th:field="*{itemName}" placeholder="e.g., Ribeye and rice" autocomplete="off" required>
                <p class="form-help">Use a clear name so it is easy to find in the nutrition log later.</p>
            </div>

            <div class="field with-unit">
                <label for="proteins">Protein</label>
                <input class="input" type="number" inputmode="decimal" id="proteins" th:field="*{proteins}" placeholder="45" step="0.01" min="0" required>
                <span class="unit">g</span>
            </div>

            <div class="field with-unit">
                <label for="fats">Fat</label>
                <input class="input" type="number" inputmode="decimal" id="fats" th:field="*{fats}" placeholder="20" step="0.01" min="0" required>
                <span class="unit">g</span>
            </div>

            <div class="field with-unit">
                <label for="carbohydrates">Carbs</label>
                <input class="input" type="number" inputmode="decimal" id="carbohydrates" th:field="*{carbohydrates}" placeholder="75" step="0.01" min="0" required>
                <span class="unit">g</span>
            </div>

            <div class="field with-unit">
                <label for="calories">Calories</label>
                <input class="input" type="number" inputmode="decimal" id="calories" th:field="*{calories}" placeholder="660" step="0.01" min="0" required>
                <span class="unit">kcal</span>
                <button class="btn btn-secondary" type="button" id="calculateCalories" style="margin-top:8px">Calculate from macros</button>
            </div>

            <div class="field span-2">
                <label for="mealType">Meal Type</label>
                <select id="mealType" th:field="*{mealType}" class="input">
                    <option value="BREAKFAST">Breakfast</option>
                    <option value="LUNCH">Lunch</option>
                    <option value="DINNER">Dinner</option>
                    <option value="SNACK">Snack</option>
                </select>
            </div>

            <details class="span-2">
                <summary>Advanced nutrition</summary>
                <div class="grid form-grid" style="margin-top: 14px">
                    <div class="field with-unit">
                        <label for="fiber">Fiber</label>
                        <input class="input" type="number" inputmode="decimal" id="fiber" th:field="*{fiber}" placeholder="4" step="0.01" min="0">
                        <span class="unit">g</span>
                    </div>

                    <div class="field with-unit">
                        <label for="sugars">Sugars</label>
                        <input class="input" type="number" inputmode="decimal" id="sugars" th:field="*{sugars}" placeholder="6" step="0.01" min="0">
                        <span class="unit">g</span>
                    </div>

                    <div class="field with-unit">
                        <label for="sodium">Sodium</label>
                        <input class="input" type="number" inputmode="decimal" id="sodium" th:field="*{sodium}" placeholder="320" step="1" min="0">
                        <span class="unit">mg</span>
                    </div>

                    <div class="field with-unit">
                        <label for="cholesterol">Cholesterol</label>
                        <input class="input" type="number" inputmode="decimal" id="cholesterol" th:field="*{cholesterol}" placeholder="45" step="1" min="0">
                        <span class="unit">mg</span>
                    </div>
                </div>
            </details>

            <button type="submit" class="btn btn-primary span-2">Log Meal</button>
        </form>
    </section>
</main>
</body>
</html>
