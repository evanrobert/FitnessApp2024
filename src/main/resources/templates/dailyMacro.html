<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Macro Goals</title>
    <link rel="stylesheet" href="/css/app.css">
    <script src="/js/app.js" defer></script>
</head>
<body>
<main class="app-shell">
    <nav class="topbar" aria-label="Main navigation">
        <a class="brand-mark" href="/home">
            <span class="brand-icon" aria-hidden="true">EF</span>
            Evan Fitness
        </a>
        <div class="nav-actions">
            <a class="btn btn-ghost" href="/total">Summary</a>
            <a class="btn btn-ghost" href="/view/Nutrition">Nutrition Log</a>
            <a class="btn btn-ghost" href="/workouts">Workouts</a>
        </div>
    </nav>

    <section class="page-title">
        <p class="eyebrow">Goal Setup</p>
        <h1>Set Daily Macro Targets</h1>
        <p>Use the sliders to set a simple daily baseline for calories and macros.</p>
    </section>

    <section class="tool-panel form-card">
        <form th:action="@{/log/custom/macro/information}" th:object="${macros}" method="post" class="grid">
            <div class="field">
                <label for="dailyCalories">Daily Calories</label>
                <div class="range-row">
                    <input type="range" id="dailyCalories" name="dailyCalories" min="0" max="5000"
                           th:value="${macros.dailyCalories}" data-range-output="caloriesValue">
                    <span class="range-output"><span id="caloriesValue" th:text="${macros.dailyCalories}">0</span></span>
                </div>
            </div>

            <div class="field">
                <label for="dailyProtein">Daily Protein (g)</label>
                <div class="range-row">
                    <input type="range" id="dailyProtein" name="dailyProtein" min="0" max="300"
                           th:value="${macros.dailyProtein}" data-range-output="proteinValue">
                    <span class="range-output"><span id="proteinValue" th:text="${macros.dailyProtein}">0</span></span>
                </div>
            </div>

            <div class="field">
                <label for="dailyFat">Daily Fat (g)</label>
                <div class="range-row">
                    <input type="range" id="dailyFat" name="dailyFat" min="0" max="200"
                           th:value="${macros.dailyFat}" data-range-output="fatValue">
                    <span class="range-output"><span id="fatValue" th:text="${macros.dailyFat}">0</span></span>
                </div>
            </div>

            <div class="field">
                <label for="dailyCarbohydrates">Daily Carbohydrates (g)</label>
                <div class="range-row">
                    <input type="range" id="dailyCarbohydrates" name="dailyCarbohydrates" min="0" max="500"
                           th:value="${macros.dailyCarbohydrates}" data-range-output="carbsValue">
                    <span class="range-output"><span id="carbsValue" th:text="${macros.dailyCarbohydrates}">0</span></span>
                </div>
            </div>

            <button class="btn btn-primary" type="submit">Save Macro Goals</button>
        </form>
    </section>
</main>
</body>
</html>
