<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<main class="auth-shell">
    <section class="auth-card">
        <p class="eyebrow">Welcome back</p>
        <h1>Login</h1>
        <p>Sign in to continue tracking meals, goals, and reports.</p>

        <form action="login" method="post">
            <div class="field">
                <label for="username">Username</label>
                <input class="input" type="text" id="username" name="username" required placeholder="Enter your username" autocomplete="username">
            </div>

            <div class="field">
                <label for="password">Password</label>
                <input class="input" type="password" id="password" name="password" required placeholder="Enter your password" autocomplete="current-password">
            </div>

            <button class="btn btn-primary" type="submit">Login</button>
            <a class="btn btn-ghost" href="/signup">Create an account</a>
        </form>
    </section>
</main>
</body>
</html>
