<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<main class="auth-shell">
    <section class="auth-card">
        <p class="eyebrow">Start tracking</p>
        <h1>Create Account</h1>
        <p>Set up your profile so your meals, macro goals, and workouts stay connected.</p>

        <form action="/submitSignup" method="post">
            <div class="field">
                <label for="username">Username</label>
                <input class="input" type="text" id="username" name="username" placeholder="Enter your username" required autocomplete="username">
            </div>

            <div class="field">
                <label for="password">Password</label>
                <input class="input" type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="new-password">
            </div>

            <div class="field">
                <label for="name">Name</label>
                <input class="input" type="text" id="name" name="name" placeholder="Enter your full name" required autocomplete="name">
            </div>

            <div class="grid form-grid">
                <div class="field">
                    <label for="age">Age</label>
                    <input class="input" type="number" id="age" name="age" placeholder="Age" min="1" required>
                </div>

                <div class="field with-unit">
                    <label for="weight">Weight</label>
                    <input class="input" type="number" id="weight" name="weight" placeholder="Weight" min="1" required>
                    <span class="unit">lb</span>
                </div>
            </div>

            <button class="btn btn-primary" type="submit">Sign Up</button>
            <a class="btn btn-ghost" href="/login">Already have an account?</a>
        </form>
    </section>
</main>
</body>
</html>
