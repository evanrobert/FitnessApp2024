<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modify Daily Intake</title>
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<main class="app-shell">
    <nav class="topbar" aria-label="Main navigation">
        <a class="brand-mark" href="/home">
            <span class="brand-icon" aria-hidden="true">EF</span>
            Evan Fitness
        </a>
        <div class="nav-actions">
            <a class="btn btn-ghost" href="/total">Summary</a>
            <a class="btn btn-ghost" href="/workouts">Workouts</a>
            <a class="btn btn-primary" href="/add/custom/meal">Log Meal</a>
        </div>
    </nav>

    <section class="page-title">
        <p class="eyebrow">Goals</p>
        <h1>Modify Daily Intake</h1>
        <p>Fine tune your targets directly. The summary screen will use these values for today’s calorie balance.</p>
    </section>

    <section class="tool-panel form-card">
        <form th:action="@{/edit/macro/information}" method="post" th:object="${userMacroInformation}" class="grid form-grid">
            <div class="field with-unit">
                <label for="calories-input">Daily Calories</label>
                <input id="calories-input" class="input" type="number" min="0" step="1" th:field="*{dailyCalories}">
                <span class="unit">kcal</span>
            </div>

            <div class="field with-unit">
                <label for="protein-input">Daily Protein</label>
                <input id="protein-input" class="input" type="number" min="0" step="1" th:field="*{dailyProtein}">
                <span class="unit">g</span>
            </div>

            <div class="field with-unit">
                <label for="fat-input">Daily Fat</label>
                <input id="fat-input" class="input" type="number" min="0" step="1" th:field="*{dailyFat}">
                <span class="unit">g</span>
            </div>

            <div class="field with-unit">
                <label for="carbs-input">Daily Carbohydrates</label>
                <input id="carbs-input" class="input" type="number" min="0" step="1" th:field="*{dailyCarbohydrates}">
                <span class="unit">g</span>
            </div>

            <div class="span-2 action-row">
                <button type="submit" class="btn btn-primary">Save Daily Intake</button>
                <a class="btn btn-ghost" href="/home">Back to Dashboard</a>
            </div>
        </form>
    </section>
</main>
</body>
</html>
