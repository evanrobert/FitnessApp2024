<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload HRA Reports</title>
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<main class="app-shell">
    <nav class="topbar" aria-label="Main navigation">
        <a class="brand-mark" href="/home">
            <span class="brand-icon" aria-hidden="true">EF</span>
            Evan Fitness
        </a>
        <div class="nav-actions">
            <a class="btn btn-ghost" href="/total">Summary</a>
            <a class="btn btn-primary" href="/add/custom/meal">Log Meal</a>
        </div>
    </nav>

    <section class="page-title">
        <p class="eyebrow">Reports</p>
        <h1>Upload HRA Reports</h1>
        <p>Attach health risk assessment files to your account and review what has already been saved.</p>
    </section>

    <section class="tool-panel form-card">
        <form th:action="@{/hra/upload}" method="post" enctype="multipart/form-data" class="grid">
            <div class="field">
                <label for="files">Report files</label>
                <input id="files" type="file" name="files" multiple required>
                <p class="form-help">You can select multiple files at once.</p>
            </div>

            <button class="btn btn-primary" type="submit">Upload Files</button>
        </form>
    </section>

    <section class="section tool-panel" th:if="${reports != null and !reports.isEmpty()}">
        <div class="section-heading">
            <div>
                <h2>Previously Uploaded Reports</h2>
                <p>Your saved report filenames.</p>
            </div>
        </div>
        <ul class="file-list">
            <li th:each="report : ${reports}" th:text="${report.fileName}"></li>
        </ul>
    </section>
</main>
</body>
</html>
